<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    
    <!-- 1. ИСПРАВЛЕНИЕ ЗНАЧКА: Переводим пути на динамический префикс React сборщика -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon-success.png" />
    
    <!-- 2. ИСПРАВЛЕНИЕ СИНТАКСИСА: Загружаем манифест с корректным расширением и префиксом пути -->
    <link rel="manifest" href="%PUBLIC_URL%/site.webmanifest.json" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0054a5" />
    
    <!-- Данное SEO-описание используется в ПЗ для подтверждения мета-тегов -->
    <meta name="description" content="To-Do+: Профессиональная среда контроля виртуальных испытаний" />
    <title>To-Do+ | Менеджер испытаний</title>
</head>
<body>
    <!-- Защитный тег для систем, где аппаратно отключена поддержка скриптов -->
    <noscript>Для работы системы управления испытаниями необходимо включить JavaScript.</noscript>
    
    <!-- Единственный корневой узел, куда компонентная модель React монтирует всё SPA-приложение -->
    <div id="root"></div>
</body>
</html>
